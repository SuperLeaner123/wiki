{% extends "encyclopedia/layout.html" %}

{% block title %}
    Create New Page
{% endblock %}

{% block body %}
    <h1>Create New Page</h1>

    <form action="{% url 'new_page' %}" method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" name="title" id="title" class="form-control" required placeholder="Enter entry title">
        </div>

        <div class="form-group">
            <label for="content">Markdown Content</label>
            <textarea name="content" id="content" class="form-control" rows="10" required placeholder="Enter content in Markdown format"></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Save Entry</button>
    </form>
{% endblock %}
